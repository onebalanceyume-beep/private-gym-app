<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>ONE TRE 予約</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#faf9f7;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;-webkit-text-size-adjust:100%}
.page{max-width:480px;margin:0 auto;padding:40px 24px 60px}
.header{text-align:center;margin-bottom:36px}
.logo{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;letter-spacing:0.3em}
.sub{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.25em;color:#999;margin-top:6px}
.divider{width:36px;height:1px;background:#ccc;margin:14px auto}
.sec-label{font-size:10px;letter-spacing:0.15em;color:#999;margin-bottom:8px;text-transform:uppercase}
.form-group{margin-bottom:24px}
.menu-buttons{display:flex;gap:12px}
.menu-btn{flex:1;padding:14px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;font-family:'Cormorant Garamond',serif;font-size:16px;text-align:center;cursor:pointer;color:#1a1a1a;-webkit-tap-highlight-color:transparent}
.menu-btn.selected{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.menu-btn .min{display:block;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:#bbb;margin-top:4px}
.menu-btn.selected .min{color:rgba(255,255,255,0.6)}
input[type=date],input[type=text],input[type=email],input[type=tel]{width:100%;padding:12px 0;border:none;border-bottom:1px solid #ddd;border-radius:0;font-family:'Noto Sans JP',sans-serif;font-size:15px;background:transparent;color:#1a1a1a;outline:none;-webkit-appearance:none;appearance:none}
input[type=date]{color-scheme:light}
input:focus{border-bottom-color:#1a1a1a}
input::placeholder{color:#bbb;font-size:13px}
.slots-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.slot-btn{padding:9px 14px;border:1px solid #ddd;border-radius:4px;background:#fff;font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;color:#1a1a1a;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.slot-btn.selected{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.slot-msg{font-size:13px;color:#bbb;padding:10px 0}
.submit-btn{width:100%;padding:17px;background:#1a1a1a;color:#fff;border:none;border-radius:4px;font-family:'Cormorant Garamond',serif;font-size:17px;letter-spacing:0.15em;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.note{font-size:11px;color:#bbb;text-align:center;margin-top:12px}
.result{text-align:center;padding:48px 0;line-height:2}
.result-title{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:0.1em;margin-bottom:12px}
.result-text{font-size:13px;color:#888;line-height:2}
.result.error .result-title{color:#c0392b}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">ONE TRE</div>
    <div class="sub">PERSONAL TRAINING</div>
    <div class="divider"></div>
  </div>
  <div id="form-area">
    <div class="form-group">
      <div class="sec-label">Menu</div>
      <div class="menu-buttons">
        <div class="menu-btn" id="btn-taiken">体験セッション<span class="min">40 min</span></div>
        <div class="menu-btn" id="btn-session">セッション<span class="min">50 min</span></div>
      </div>
    </div>
    <div class="form-group">
      <div class="sec-label">Date</div>
      <input type="date" id="date-input">
    </div>
    <div class="form-group">
      <div class="sec-label">Time</div>
      <div id="slots-area" class="slot-msg">メニューと日付を選んでください</div>
    </div>
    <div class="form-group">
      <div class="sec-label">Name</div>
      <input type="text" id="name-input" placeholder="お名前">
    </div>
    <div id="taiken-fields" style="display:none">
      <div class="form-group">
        <div class="sec-label">Email</div>
        <input type="email" id="email-input" placeholder="メールアドレス">
      </div>
      <div class="form-group">
        <div class="sec-label">Tel</div>
        <input type="tel" id="phone-input" placeholder="電話番号">
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" disabled>RESERVE</button>
    <p class="note">※ 予約は2日前まで　※ 日曜定休</p>
  </div>
  <div id="result-area" style="display:none"></div>
</div>
<script>
var GAS='https://script.google.com/macros/s/AKfycbytOwvS7EBwzfKqhrlYCsNxkeE3Fiq2l8UBh5a7VUB_I6kqSW5qVVEjIZEjJbruHemH/exec';
var menu='',dur=0,slot=null,taiken=false;

function setMin(){
  var d=new Date();d.setDate(d.getDate()+2);
  var y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);
  document.getElementById('date-input').min=y+'-'+m+'-'+dd;
}

function selectMenu(m,d,el,t){
  menu=m;dur=d;taiken=t;slot=null;
  document.getElementById('btn-taiken').classList.remove('selected');
  document.getElementById('btn-session').classList.remove('selected');
  el.classList.add('selected');
  document.getElementById('taiken-fields').style.display=t?'block':'none';
  var date=document.getElementById('date-input').value;
  if(date)loadSlots();
  else document.getElementById('slots-area').innerHTML='<div class="slot-msg">日付を選んでください</div>';
  check();
}

function loadSlots(){
  var date=document.getElementById('date-input').value;
  if(!date){
    document.getElementById('slots-area').innerHTML='<div class="slot-msg">日付を選んでください</div>';
    return;
  }
  if(!menu){
    document.getElementById('slots-area').innerHTML='<div class="slot-msg">メニューを選んでください</div>';
    return;
  }
  var area=document.getElementById('slots-area');
  area.innerHTML='<div class="slot-msg">確認中...</div>';
  slot=null;check();
  var cb='cb'+Date.now();
  window[cb]=function(res){
    delete window[cb];
    if(res.error){area.innerHTML='<div class="slot-msg">'+res.error+'</div>';return;}
    if(!res.slots||res.slots.length===0){area.innerHTML='<div class="slot-msg">この日は空きがありません</div>';return;}
    var wrap=document.createElement('div');
    wrap.className='slots-wrap';
    for(var i=0;i<res.slots.length;i++){
      var s=res.slots[i];
      var b=document.createElement('button');
      b.className='slot-btn';
      b.textContent=s.label;
      b.setAttribute('data-s',JSON.stringify(s));
      b.onclick=function(){
        var data=JSON.parse(this.getAttribute('data-s'));
        slot=data;
        var all=document.querySelectorAll('.slot-btn');
        for(var j=0;j<all.length;j++)all[j].classList.remove('selected');
        this.classList.add('selected');
        check();
      };
      wrap.appendChild(b);
    }
    area.innerHTML='';
    area.appendChild(wrap);
  };
  var sc=document.createElement('script');
  sc.onerror=function(){area.innerHTML='<div class="slot-msg">エラーが発生しました</div>';};
  sc.src=GAS+'?action=getSlots&date='+date+'&duration='+dur+'&callback='+cb;
  document.head.appendChild(sc);
}

function check(){
  var name=document.getElementById('name-input').value;
  var email=document.getElementById('email-input').value;
  var phone=document.getElementById('phone-input').value;
  var btn=document.getElementById('submit-btn');
  if(taiken){btn.disabled=!(menu&&slot&&name&&email&&phone);}
  else{btn.disabled=!(menu&&slot&&name);}
}

function submit(){
  var name=document.getElementById('name-input').value.trim();
  var email=taiken?document.getElementById('email-input').value.trim():'';
  var phone=taiken?document.getElementById('phone-input').value.trim():'';
  var btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送信中...';
  var cb='cb'+Date.now();
  window[cb]=function(res){
    delete window[cb];
    document.getElementById('form-area').style.display='none';
    var ra=document.getElementById('result-area');
    ra.style.display='block';
    if(res.success){
      ra.innerHTML='<div class="result"><div class="result-title">ご予約ありがとうございます</div><div class="result-text">確認メールをお送りしました。<br>当日お待ちしております。<br><br>ONE TRE</div></div>';
    }else{
      ra.innerHTML='<div class="result error"><div class="result-title">予約できませんでした</div><div class="result-text">'+res.message+'</div></div>';
      setTimeout(function(){document.getElementById('form-area').style.display='block';ra.style.display='none';btn.disabled=false;btn.textContent='RESERVE';},3000);
    }
  };
  var sc=document.createElement('script');
  sc.src=GAS+'?action=reserve&name='+encodeURIComponent(name)+'&email='+encodeURIComponent(email)+'&phone='+encodeURIComponent(phone)+'&menu='+encodeURIComponent(menu)+'&start='+encodeURIComponent(slot.start)+'&end='+encodeURIComponent(slot.end)+'&callback='+cb;
  document.head.appendChild(sc);
}

setMin();
document.getElementById('btn-taiken').onclick=function(){selectMenu('体験セッション',40,this,true);};
document.getElementById('btn-session').onclick=function(){selectMenu('セッション',50,this,false);};
document.getElementById('date-input').onchange=loadSlots;
document.getElementById('name-input').oninput=check;
document.getElementById('email-input').oninput=check;
document.getElementById('phone-input').oninput=check;
document.getElementById('submit-btn').onclick=submit;
</script>
</body>
</html>
