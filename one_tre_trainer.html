<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONE TRE — Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg2:#fafafa;--bg3:#f5f5f5;--black:#111;--g1:#444;--g2:#777;--g3:#aaa;--g4:#ccc;--g5:#e0e0e0;--g6:#f0f0f0;--strength:#c0392b;--core:#2980b9;--move:#27ae60;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg3);color:var(--black);min-height:100vh}
.app{max-width:960px;margin:0 auto;background:var(--bg)}
.topbar{background:var(--bg);border-bottom:1px solid var(--g5);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--black);letter-spacing:.3em}
.logo-sub{font-size:7px;color:var(--g4);letter-spacing:.2em;margin-top:2px;font-weight:300}
.logo-catch{font-family:'Cormorant Garamond',serif;font-size:10px;font-style:italic;color:var(--g3);margin-top:2px;letter-spacing:.06em}
.mode-badge{font-size:9px;padding:4px 10px;border:1px solid var(--g5);color:var(--g2);letter-spacing:.1em;font-weight:300}
.nav{background:var(--bg);border-bottom:1px solid var(--g5);padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nbtn{font-size:10px;padding:12px 14px;border:none;background:transparent;color:var(--g4);cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;border-bottom:1.5px solid transparent;flex-shrink:0;letter-spacing:.12em;transition:all .2s}
.nbtn.active{color:var(--black);border-bottom-color:var(--black)}
.page{display:none;padding:20px}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;margin-bottom:20px;background:var(--g5)}
@media(min-width:600px){.metrics{grid-template-columns:repeat(4,1fr)}}
.metric{background:var(--bg);padding:18px 14px}
.ml{font-size:8px;color:var(--g4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;font-weight:300}
.mv{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--black);font-weight:300}
.ms{font-size:10px;color:var(--g2);margin-top:4px}
.card{background:var(--bg);border:.5px solid var(--g5);padding:18px;margin-bottom:12px}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:.2em;color:var(--g4);margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.ctitle::after{content:'';flex:1;height:.5px;background:var(--g6)}
.charts-row{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:600px){.charts-row{grid-template-columns:1fr 1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:8px;color:var(--g4);letter-spacing:.16em;text-transform:uppercase;font-weight:300}
.fg input,.fg select{font-size:13px;padding:9px 12px;border:.5px solid var(--g5);border-radius:0;background:var(--bg);color:var(--black);font-family:'Noto Sans JP',sans-serif;width:100%;transition:border-color .2s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--black)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-black{background:var(--black);color:#fff;border:1px solid var(--black);padding:10px 22px;border-radius:0;font-size:11px;cursor:pointer;letter-spacing:.14em;margin-top:12px;font-family:'Noto Sans JP',sans-serif}
.btn-ghost{background:transparent;border:.5px solid var(--g4);padding:7px 14px;border-radius:0;font-size:11px;cursor:pointer;color:var(--g1);font-family:'Noto Sans JP',sans-serif;letter-spacing:.06em}
.btn-ghost:hover{border-color:var(--black);color:var(--black)}
.mrow{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:.5px solid var(--g6)}
.mrow:last-child{border:none}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;flex-shrink:0;background:var(--black);color:#fff}
.mname{font-size:13px;color:var(--black);font-weight:300;letter-spacing:.04em}
.mmeta{font-size:10px;color:var(--g3);margin-top:2px}
.url-box{display:flex;align-items:center;gap:6px;margin-top:8px;background:var(--g6);padding:8px 10px}
.url-text{font-size:9px;color:var(--g2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.copy-btn{font-size:8px;padding:4px 10px;background:var(--black);color:#fff;border:none;cursor:pointer;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.set-card{border:.5px solid var(--g5);padding:14px;margin-bottom:10px;background:var(--bg2)}
.set-top{display:grid;grid-template-columns:2fr 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:12px}
.set-top input{font-size:12px;padding:7px 8px;border:.5px solid var(--g5);border-radius:0;background:var(--bg);color:var(--black);font-family:'Noto Sans JP',sans-serif;width:100%}
.del-btn{width:28px;height:28px;border:.5px solid var(--g5);background:transparent;cursor:pointer;color:var(--g3);font-size:14px}
.cat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cat-box{padding:10px 8px;text-align:center;border:.5px solid var(--g5)}
.cat-box.strength{border-color:var(--strength);background:#fdf0f0}
.cat-box.core{border-color:var(--core);background:#f0f7fd}
.cat-box.move{border-color:var(--move);background:#f0fdf4}
.cat-label{font-size:10px;font-weight:500;margin-bottom:6px}
.cat-box.strength .cat-label{color:var(--strength)}
.cat-box.core .cat-label{color:var(--core)}
.cat-box.move .cat-label{color:var(--move)}
.cat-input{width:60px;font-size:18px;font-weight:500;text-align:center;padding:4px;border:.5px solid var(--g5);border-radius:0;background:var(--bg);color:var(--black);font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none}
.cat-total{font-size:11px;color:var(--g3);margin-top:8px;text-align:right}
.cat-total.ok{color:var(--move);font-weight:500}
.cat-total.ng{color:var(--strength);font-weight:500}
.pi{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--g6)}
.pi:last-child{border:none}
.pn{font-size:13px;color:var(--black);font-weight:300}
.msel{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.msel select,.msel input[type=date]{font-size:12px;padding:7px 11px;border:.5px solid var(--g5);border-radius:0;background:var(--bg);color:var(--black);font-family:'Noto Sans JP',sans-serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cday{text-align:center;padding:6px 2px;font-size:11px;color:var(--g4);font-weight:300}
.cday.hdr{font-size:8px;color:var(--g4);font-weight:400;letter-spacing:.08em}
.cday.has{background:var(--black);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:10px}
.cday.today{border:1px solid var(--black);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.sales-kpi{display:grid;grid-template-columns:1fr;gap:1px;margin-bottom:20px;background:var(--g5)}
@media(min-width:480px){.sales-kpi{grid-template-columns:repeat(3,1fr)}}
.course-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--g6)}
.course-item:last-child{border:none}
.loading{text-align:center;padding:32px;color:var(--g3);font-size:13px;letter-spacing:.1em}
.cat-badge{font-size:9px;padding:1px 5px;margin-left:2px;font-weight:500}
.cat-badge.s{background:#fdf0f0;color:var(--strength);border:.5px solid var(--strength)}
.cat-badge.c{background:#f0f7fd;color:var(--core);border:.5px solid var(--core)}
.cat-badge.m{background:#f0fdf4;color:var(--move);border:.5px solid var(--move)}
.hdr-row{display:grid;grid-template-columns:2fr 1fr 1fr 28px;gap:6px;margin-bottom:6px}
.hdr-row span{font-size:9px;color:var(--g4);letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="logo">ONE TRE</div>
      <div class="logo-sub">PERSONAL TRAINING · YONAGO</div>
      <div class="logo-catch">私は私</div>
    </div>
    <div class="mode-badge">TRAINER MODE</div>
  </div>
  <div class="nav">
    <button class="nbtn active" onclick="sp('dashboard',this)">ダッシュボード</button>
    <button class="nbtn" onclick="sp('sales',this)">売上管理</button>
    <button class="nbtn" onclick="sp('members',this)">会員管理</button>
    <button class="nbtn" onclick="sp('training',this)">トレーニング</button>
    <button class="nbtn" onclick="sp('calendar',this)">カレンダー</button>
  </div>

  <div id="page-dashboard" class="page active">
    <div class="metrics">
      <div class="metric"><div class="ml">Total Members</div><div class="mv" id="mt">0</div><div class="ms">名</div></div>
      <div class="metric"><div class="ml">Female</div><div class="mv" id="mf">0</div><div class="ms" id="mfp">-%</div></div>
      <div class="metric"><div class="ml">Male</div><div class="mv" id="mm">0</div><div class="ms" id="mmp">-%</div></div>
      <div class="metric"><div class="ml">Sessions</div><div class="mv" id="msess">0</div><div class="ms">今月</div></div>
    </div>
    <div class="charts-row">
      <div class="card"><div class="ctitle">Gender Ratio</div><div style="position:relative;height:180px"><canvas id="cg"></canvas></div></div>
      <div class="card"><div class="ctitle">カテゴリ全体バランス</div><div style="position:relative;height:180px"><canvas id="cr"></canvas></div></div>
    </div>
  </div>

  <div id="page-sales" class="page">
    <div id="sales-loading" class="loading">データ取得中...</div>
    <div id="sales-content" style="display:none">
      <div class="sales-kpi">
        <div class="metric"><div class="ml">今月の売上</div><div class="mv" id="s-month">¥0</div><div class="ms" id="s-month-count">0件</div></div>
        <div class="metric"><div class="ml">年間売上</div><div class="mv" id="s-year">¥0</div><div class="ms" id="s-year-count">0件</div></div>
        <div class="metric"><div class="ml">累計売上</div><div class="mv" id="s-total">¥0</div><div class="ms" id="s-total-count">0件</div></div>
      </div>
      <div class="card"><div class="ctitle">コース別詳細</div><div id="course-detail"></div></div>
      <div class="card"><div class="ctitle">申込一覧</div><div id="form-list"></div></div>
    </div>
    <div id="sales-error" style="display:none;padding:20px;color:var(--g3);font-size:13px;text-align:center">データの取得に失敗しました。</div>
  </div>

  <div id="page-members" class="page">
    <div class="card">
      <div class="ctitle">新規会員登録</div>
      <div class="form-grid">
        <div class="fg"><label>氏名</label><input id="in" placeholder="山田 花子"></div>
        <div class="fg"><label>生年月日</label><input id="id" type="date"></div>
        <div class="fg"><label>性別</label><select id="ig"><option value="f">女性</option><option value="m">男性</option></select></div>
        <div class="fg"><label>体重 (kg)</label><input id="iw" type="number" step="0.1" placeholder="55.0"></div>
      </div>
      <button class="btn-black" onclick="addM()">登録する → 専用URLを自動発行</button>
    </div>
    <div class="card">
      <div class="ctitle">会員一覧</div>
      <div id="mlist"><p style="font-size:13px;color:var(--g3)">読み込み中...</p></div>
    </div>
  </div>

  <div id="page-training" class="page">
    <div class="card">
      <div class="ctitle">トレーニング記録</div>
      <div class="msel">
        <select id="str" onchange="rRec()"><option value="">会員を選択</option></select>
        <input id="idate" type="date">
      </div>
      <div id="sw"></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn-ghost" onclick="addS()">+ 種目追加</button>
        <button class="btn-black" onclick="saveTr()">記録を保存 → 会員画面に反映</button>
      </div>
    </div>
    <div class="card"><div class="ctitle">直近の記録</div><div id="rl"></div></div>
  </div>

  <div id="page-calendar" class="page">
    <div class="card">
      <div class="msel">
        <select id="scal" onchange="rCal()"><option value="">全会員</option></select>
        <button class="btn-ghost" onclick="cPrev()">&#8249;</button>
        <span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--black)" id="ctitle"></span>
        <button class="btn-ghost" onclick="cNext()">&#8250;</button>
      </div>
      <div class="cal-grid" id="chdr"></div>
      <div class="cal-grid" style="margin-top:4px" id="cbody"></div>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyFxm7VLhjWfWlVA5FgtyBHaKP6rMHko76GQzkQVWsQuyrV-J_3fpyItFBdte4rBlw/exec';
const NAME_KEY='お名前（長尾儀弘）';
let gasMembers=[], gasTraining=[];
let cY=new Date().getFullYear(), cM2=new Date().getMonth();
let C={};

function dc(k){if(C[k]){C[k].destroy();delete C[k];}}
function fmtYen(n){return '¥'+Math.round(n).toLocaleString();}
function age(d){if(!d)return null;const dt=new Date(d),n=new Date();let a=n.getFullYear()-dt.getFullYear();if(n.getMonth()<dt.getMonth()||(n.getMonth()===dt.getMonth()&&n.getDate()<dt.getDate()))a--;return a;}

async function gas(params){
  const url=GAS_URL+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url,{method:'GET',mode:'cors'});
  return await res.json();
}

async function loadAll(){
  try{
    const [mRes,tRes]=await Promise.all([gas({action:'getMembers'}),gas({action:'getTraining'})]);
    gasMembers=mRes.success?mRes.members:[];
    gasTraining=tRes.success?tRes.records.map(r=>({
      id:r['記録ID'],memberId:r['会員ID'],date:r['日付'],
      sets:(()=>{try{return JSON.parse(r['種目データ']||'[]');}catch(e){return[];}})()
    })):[];
    pSel();rMem();rDash();rRec();
  }catch(e){console.error(e);}
}

function getMemberUrl(id){return 'https://onebalanceyume-beep.github.io/private-gym-app/one_tre_member.html?id='+id;}

function sp(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');btn.classList.add('active');
  if(name==='dashboard')rDash();
  if(name==='sales')rSales();
  if(name==='members')rMem();
  if(name==='training'){pSel();rRec();if(!document.getElementById('sw').children.length)addS();}
  if(name==='calendar'){pSel();rCal();}
}

function rDash(){
  const t=gasMembers.length,f=gasMembers.filter(m=>m['性別']==='f').length,ml=t-f;
  document.getElementById('mt').textContent=t;
  document.getElementById('mf').textContent=f;
  document.getElementById('mfp').textContent=t?Math.round(f/t*100)+'%':'-%';
  document.getElementById('mm').textContent=ml;
  document.getElementById('mmp').textContent=t?Math.round(ml/t*100)+'%':'-%';
  const now=new Date();
  const mSess=gasTraining.filter(t=>t.date&&t.date.startsWith(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'))).length;
  document.getElementById('msess').textContent=mSess;
  dc('g');
  C.g=new Chart(document.getElementById('cg'),{type:'doughnut',data:{labels:['女性','男性'],datasets:[{data:[f,ml],backgroundColor:['#111','#888'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:'#888',font:{size:11},padding:12,boxWidth:10}}}}});
  let totalS=0,totalC=0,totalM=0;
  gasTraining.forEach(t=>t.sets.forEach(s=>{totalS+=(s.strength||0);totalC+=(s.core||0);totalM+=(s.move||0);}));
  dc('cr');
  C.cr=new Chart(document.getElementById('cr'),{type:'radar',data:{labels:['筋力','体幹','動く'],datasets:[{data:[totalS,totalC,totalM],backgroundColor:'rgba(17,17,17,0.1)',borderColor:'#111',borderWidth:2,pointBackgroundColor:['#c0392b','#2980b9','#27ae60'],pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{beginAtZero:true,ticks:{display:false},grid:{color:'#eee'},pointLabels:{font:{size:12},color:'#444'}}},plugins:{legend:{display:false}}}});
}

async function rSales(){
  document.getElementById('sales-loading').style.display='block';
  document.getElementById('sales-content').style.display='none';
  document.getElementById('sales-error').style.display='none';
  try{
    const rawData=await gas({});
    const data=rawData&&!Array.isArray(rawData)?(rawData.all||[]):rawData;
    if(!data||!data.length){document.getElementById('sales-loading').style.display='none';document.getElementById('sales-error').style.display='block';return;}
    document.getElementById('sales-loading').style.display='none';
    document.getElementById('sales-content').style.display='block';
    const now=new Date(),ty=now.getFullYear(),tm=now.getMonth()+1;
    let mT=0,mC=0,yT=0,yC=0,aT=0,aC=0;
    const cD={};
    data.forEach(row=>{
      const ts=row['タイムスタンプ'],actual=parseFloat(row['実際の金額']||row['定価']||0),course=row['各コース']||'不明';
      if(!ts||!actual)return;
      const d=new Date(ts),y=d.getFullYear(),mo=d.getMonth()+1;
      aT+=actual;aC++;
      if(y===ty){yT+=actual;yC++;if(mo===tm){mT+=actual;mC++;}}
      const cn=course.split('¥')[0].trim().substring(0,20);
      if(!cD[cn])cD[cn]={total:0,count:0};
      cD[cn].total+=actual;cD[cn].count++;
    });
    document.getElementById('s-month').textContent=fmtYen(mT);
    document.getElementById('s-month-count').textContent=mC+'件';
    document.getElementById('s-year').textContent=fmtYen(yT);
    document.getElementById('s-year-count').textContent=yC+'件';
    document.getElementById('s-total').textContent=fmtYen(aT);
    document.getElementById('s-total-count').textContent=aC+'件';
    const det=document.getElementById('course-detail');det.innerHTML='';
    Object.entries(cD).sort((a,b)=>b[1].total-a[1].total).forEach(([n,d])=>{
      const div=document.createElement('div');div.className='course-item';
      div.innerHTML=`<div><div style="font-size:12px">${n}</div><div style="font-size:10px;color:var(--g3)">${d.count}件</div></div><div style="font-family:'Cormorant Garamond',serif;font-size:14px">${fmtYen(d.total)}</div>`;
      det.appendChild(div);
    });
    const fl=document.getElementById('form-list');fl.innerHTML='';
    [...data].reverse().slice(0,10).forEach(row=>{
      const div=document.createElement('div');div.className='pi';
      const ts=row['タイムスタンプ']?new Date(row['タイムスタンプ']).toLocaleDateString('ja-JP'):'';
      const name=row[NAME_KEY]||row['お名前']||'-';
      const course=(row['各コース']||'-').split('¥')[0].trim().substring(0,15);
      const actual=parseFloat(row['実際の金額']||0);
      div.innerHTML=`<div><div class="pn">${name}</div><div style="font-size:11px;color:var(--g3);margin-top:2px">${ts} / ${course}</div></div><div style="font-family:'Cormorant Garamond',serif;font-size:14px">${fmtYen(actual)}</div>`;
      fl.appendChild(div);
    });
  }catch(e){document.getElementById('sales-loading').style.display='none';document.getElementById('sales-error').style.display='block';}
}

function rMem(){
  const l=document.getElementById('mlist');
  l.innerHTML=gasMembers.length?'':'<p style="font-size:13px;color:var(--g3)">会員がいません</p>';
  gasMembers.forEach(m=>{
    const name=m['お名前']||'',id=m['会員ID']||'',url=getMemberUrl(id);
    const d=document.createElement('div');d.className='mrow';
    d.innerHTML=`<div class="av">${name.charAt(0)}</div>
      <div style="flex:1;min-width:0">
        <div class="mname">${name}</div>
        <div class="mmeta">${m['性別']==='f'?'女性':'男性'}${m['生年月日']?' / '+age(m['生年月日'])+'歳':''}</div>
        <div class="url-box">
          <span class="url-text">${url}</span>
          <button class="copy-btn" onclick="cpUrl('${url}',this)">URLをコピー</button>
        </div>
      </div>`;
    l.appendChild(d);
  });
}

function cpUrl(url,btn){navigator.clipboard.writeText(url).then(()=>{btn.textContent='✓ コピー済';setTimeout(()=>btn.textContent='URLをコピー',2000);});}

async function addM(){
  const n=document.getElementById('in').value.trim();
  if(!n){alert('氏名を入力してください');return;}
  const btn=document.querySelector('#page-members .btn-black');
  btn.textContent='登録中...';btn.disabled=true;
  try{
    const res=await gas({action:'addMember',name:n,gender:document.getElementById('ig').value,dob:document.getElementById('id').value,weight:document.getElementById('iw').value});
    if(res.success){
      alert('登録しました！\n会員URLをコピーしてLINEで送ってください。');
      ['in','id','iw'].forEach(i=>document.getElementById(i).value='');
      await loadAll();
    }else{alert('登録に失敗しました: '+(res.error||''));}
  }catch(e){alert('登録に失敗しました');}
  btn.textContent='登録する → 専用URLを自動発行';btn.disabled=false;
}

function pSel(){
  ['str','scal'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    const ha=s.options[0]&&s.options[0].value==='';
    while(s.options.length>(ha?1:0))s.remove(ha?1:0);
    gasMembers.forEach(m=>{const o=document.createElement('option');o.value=m['会員ID'];o.textContent=m['お名前'];s.appendChild(o);});
  });
  const td=document.getElementById('idate');if(td&&!td.value)td.value=new Date().toISOString().slice(0,10);
}

function makeSetCard(){
  const div=document.createElement('div');div.className='set-card';
  div.innerHTML=`
    <div class="set-top">
      <input placeholder="種目名（例：スクワット）" inputmode="text">
      <input type="number" placeholder="重量kg" step="0.5" inputmode="decimal">
      <input type="number" placeholder="回数" inputmode="numeric">
      <button class="del-btn" onclick="this.closest('.set-card').remove()">×</button>
    </div>
    <div style="font-size:10px;color:var(--g3);margin-bottom:8px;letter-spacing:.06em">カテゴリバランス（合計が10になるように入力）</div>
    <div class="cat-row">
      <div class="cat-box strength">
        <div class="cat-label">筋力</div>
        <input class="cat-input" type="number" value="4" min="0" max="10" inputmode="numeric" oninput="updateTotal(this)">
      </div>
      <div class="cat-box core">
        <div class="cat-label">体幹</div>
        <input class="cat-input" type="number" value="3" min="0" max="10" inputmode="numeric" oninput="updateTotal(this)">
      </div>
      <div class="cat-box move">
        <div class="cat-label">動く</div>
        <input class="cat-input" type="number" value="3" min="0" max="10" inputmode="numeric" oninput="updateTotal(this)">
      </div>
    </div>
    <div class="cat-total ok">合計: 10 / 10</div>`;
  return div;
}

function addS(){
  document.getElementById('sw').appendChild(makeSetCard());
}

function updateTotal(input){
  const card=input.closest('.set-card');
  const inputs=card.querySelectorAll('.cat-input');
  const total=Array.from(inputs).reduce((s,i)=>s+(parseInt(i.value)||0),0);
  const el=card.querySelector('.cat-total');
  el.textContent='合計: '+total+' / 10';
  el.className='cat-total '+(total===10?'ok':'ng');
}

async function saveTr(){
  const mid=document.getElementById('str').value,dt=document.getElementById('idate').value;
  if(!mid||!dt){alert('会員と日付を選んでください');return;}
  const sets=[];
  let hasError=false;
  document.querySelectorAll('#sw .set-card').forEach(card=>{
    const ins=card.querySelectorAll('.set-top input');
    const catIns=card.querySelectorAll('.cat-input');
    const e=ins[0].value.trim(),w=parseFloat(ins[1].value),rep=parseInt(ins[2].value);
    const s=parseInt(catIns[0].value)||0,co=parseInt(catIns[1].value)||0,mv=parseInt(catIns[2].value)||0;
    if(!e)return;
    if(s+co+mv!==10){hasError=true;return;}
    sets.push({exercise:e,weight:w||0,reps:rep||0,strength:s,core:co,move:mv});
  });
  if(hasError){alert('カテゴリの合計が10になっていない種目があります。\n確認してください。');return;}
  if(!sets.length){alert('種目名を入力してください');return;}
  const btn=document.querySelector('#page-training .btn-black');
  btn.textContent='保存中...';btn.disabled=true;
  try{
    const res=await gas({action:'saveTraining',id:mid,date:dt,sets:JSON.stringify(sets)});
    if(res.success){
      document.getElementById('sw').innerHTML='';
      addS();
      await loadAll();
      alert('保存しました！会員の専用画面に反映されました。');
    }else{alert('保存に失敗しました');}
  }catch(e){alert('保存に失敗しました');}
  btn.textContent='記録を保存 → 会員画面に反映';btn.disabled=false;
}

function rRec(){
  const mid=document.getElementById('str')?document.getElementById('str').value:'';
  const l=document.getElementById('rl');
  const rs=gasTraining.filter(t=>!mid||t.memberId===mid).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  l.innerHTML=rs.length?'':'<p style="font-size:13px;color:var(--g3)">記録なし</p>';
  rs.forEach(t=>{
    const mem=gasMembers.find(m=>m['会員ID']===t.memberId);
    const d=document.createElement('div');d.className='pi';
    const setHtml=t.sets.map(s=>`${s.exercise} ${s.weight}kg×${s.reps}回 <span class="cat-badge s">${s.strength||0}</span><span class="cat-badge c">${s.core||0}</span><span class="cat-badge m">${s.move||0}</span>`).join(' / ');
    d.innerHTML=`<div style="min-width:0"><div class="pn">${t.date}${mem?' — '+mem['お名前']:''}</div><div style="font-size:11px;color:var(--g3);margin-top:4px;line-height:2">${setHtml}</div></div>`;
    l.appendChild(d);
  });
}

function rCal(){
  const mid=document.getElementById('scal').value;
  document.getElementById('ctitle').textContent=cY+'年'+(cM2+1)+'月';
  document.getElementById('chdr').innerHTML=['日','月','火','水','木','金','土'].map(d=>`<div class="cday hdr">${d}</div>`).join('');
  const first=new Date(cY,cM2,1).getDay(),days=new Date(cY,cM2+1,0).getDate(),today=new Date().toISOString().slice(0,10);
  let html=Array(first).fill('<div class="cday"></div>').join('');
  for(let d=1;d<=days;d++){
    const ds=`${cY}-${String(cM2+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=gasTraining.some(t=>t.date===ds&&(!mid||t.memberId===mid));
    const isT=ds===today;
    html+=`<div class="cday${has?' has':''}${isT&&!has?' today':''}">${d}</div>`;
  }
  document.getElementById('cbody').innerHTML=html;
}
function cPrev(){cM2--;if(cM2<0){cM2=11;cY--;}rCal();}
function cNext(){cM2++;if(cM2>11){cM2=0;cY++;}rCal();}

// 起動時に種目入力欄を1行表示
loadAll().then(()=>{
  if(!document.getElementById('sw').children.length) addS();
});
</script>
</body>
</html>
